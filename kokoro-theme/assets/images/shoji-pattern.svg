<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- Shoji screen grid pattern — for CSS background-repeat -->
  <rect width="60" height="60" fill="none"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
  <line x1="60" y1="0" x2="60" y2="60" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="0" x2="60" y2="0" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="60" x2="60" y2="60" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
  <line x1="30" y1="0" x2="30" y2="60" stroke="currentColor" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="30" x2="60" y2="30" stroke="currentColor" stroke-width="0.3" opacity="0.05"/>
</svg>
